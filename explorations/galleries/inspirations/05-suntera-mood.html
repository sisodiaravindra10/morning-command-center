<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inspiration 05 - Leo Pipeline Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* phone 1 - warm */
    --p1-pink: #FBD9CC;
    --p1-pink-soft: #FCE3D9;
    --p1-orange: #F4511E;
    --p1-orange-deep: #E1480F;
    --p1-head: #FF8A3D;
    --p1-head-deep: #FB7322;
    /* phone 2 - cool */
    --p2-yellow: #FFD23E;
    --p2-yellow-soft: #FFDE6B;
    --p2-green: #2E9E5B;
    --p2-green-deep: #248B4D;
    --p2-hill: #3FB56C;
    --p2-hill-deep: #2E9E5B;
    /* shared */
    --pill-glass: rgba(255, 255, 255, 0.22);
    --pill-glass-line: rgba(255, 255, 255, 0.42);
    --pill-text: #ffffff;
    --select: #FFD23E;
    --ink: #141414;
    --lav: #C9BEF0;
    --lav-deep: #B7A8EB;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    font-family: "Inter", system-ui, sans-serif;
    /* lavender / purple backdrop */
    background:
      radial-gradient(140% 90% at 20% 0%, var(--lav) 0%, var(--lav-deep) 55%, #A693E6 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 48px 16px 64px;
    position: relative;
    color: var(--ink);
  }

  .caption {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(40, 24, 70, 0.62);
    font-weight: 500;
  }

  .stage {
    display: flex;
    flex-direction: row;
    gap: 44px;
    align-items: flex-start;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* decorative "//" bottom-right of backdrop */
  .slashmark {
    position: fixed;
    right: 30px;
    bottom: 22px;
    font-family: "Anton", sans-serif;
    font-size: 40px;
    line-height: 1;
    letter-spacing: -0.04em;
    color: rgba(40, 24, 70, 0.32);
    transform: skewX(-12deg);
    user-select: none;
    pointer-events: none;
  }

  /* ---------- iPhone frame ---------- */
  .phone {
    width: 360px;
    height: 760px;
    background: #0b0b0d;
    border-radius: 52px;
    padding: 10px;
    box-shadow:
      0 60px 110px -44px rgba(50, 30, 80, 0.5),
      0 0 0 2px rgba(255, 255, 255, 0.05) inset;
    position: relative;
    flex: 0 0 auto;
  }

  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 43px;
    overflow: hidden;
    isolation: isolate;
    display: flex;
    flex-direction: column;
  }

  /* notch */
  .notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 116px;
    height: 28px;
    background: #0b0b0d;
    border-bottom-left-radius: 16px;
    border-bottom-right-radius: 16px;
    z-index: 40;
  }

  /* status bar */
  .statusbar {
    position: relative;
    z-index: 30;
    height: 44px;
    flex: 0 0 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 26px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .statusbar .glyphs {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .statusbar .glyphs svg { display: block; }

  /* ---------- screen backgrounds (no hard seam) ---------- */
  .screen.warm {
    background: linear-gradient(
      180deg,
      var(--p1-pink) 0%,
      var(--p1-pink) 16%,
      var(--p1-head) 33%,
      var(--p1-orange) 56%,
      var(--p1-orange) 100%
    );
    color: var(--ink);
  }
  .screen.cool {
    background: linear-gradient(
      180deg,
      var(--p2-yellow) 0%,
      var(--p2-yellow) 20%,
      var(--p2-hill) 40%,
      var(--p2-green) 62%,
      var(--p2-green) 100%
    );
    color: var(--ink);
  }

  /* ---------- top bar (wordmark + grid button) ---------- */
  .topbar {
    position: relative;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 24px 0;
    flex: 0 0 auto;
  }
  .wordmark {
    font-family: "Anton", sans-serif;
    font-weight: 400;
    color: #111;
    font-size: 27px;
    letter-spacing: 0.005em;
    line-height: 1;
    display: flex;
    align-items: flex-start;
    gap: 1px;
  }
  .wordmark sup {
    font-size: 9px;
    font-family: "Inter", sans-serif;
    font-weight: 700;
    top: 0.2em;
  }
  .gridbtn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: grid;
    place-items: center;
    box-shadow: 0 6px 16px -8px rgba(0, 0, 0, 0.4);
    transition: transform 0.15s ease;
  }
  .gridbtn:active { transform: scale(0.94); }
  .gridbtn.orange { background: var(--p1-orange-deep); }
  .gridbtn.green { background: var(--p2-green-deep); }
  .gridbtn .dots {
    display: grid;
    grid-template-columns: repeat(3, 4px);
    grid-template-rows: repeat(2, 4px);
    gap: 3px;
  }
  .gridbtn .dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #fff;
  }

  /* ---------- character zone ---------- */
  .character {
    position: relative;
    z-index: 10;
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    padding: 4px 0 0;
  }
  .character svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  /* eye blink (gentle idle) */
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    96% { transform: scaleY(0.08); }
  }
  .blink-eye {
    transform-box: fill-box;
    transform-origin: center;
    animation: blink 5.5s ease-in-out infinite;
  }
  .blink-eye.delay { animation-delay: 0.12s; }

  @keyframes sway {
    0%, 100% { transform: translateX(0) rotate(0deg); }
    50% { transform: translateX(3px) rotate(0.6deg); }
  }
  .sway {
    transform-box: fill-box;
    transform-origin: 50% 90%;
    animation: sway 7s ease-in-out infinite;
  }

  @media (prefers-reduced-motion: reduce) {
    .blink-eye, .sway { animation: none !important; }
  }

  /* ---------- bottom content block ---------- */
  .panel {
    position: relative;
    z-index: 20;
    flex: 0 0 auto;
    padding: 0 22px 24px;
  }
  .headline {
    font-family: "Anton", sans-serif;
    font-weight: 400;
    color: #fff;
    text-transform: uppercase;
    font-size: 48px;
    line-height: 0.94;
    letter-spacing: 0.004em;
    text-align: left;
  }
  .datestamp {
    text-align: center;
    color: rgba(255, 255, 255, 0.92);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 12px 0 16px;
  }

  /* ---------- pill grid ---------- */
  .pillgrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
  }
  .pill {
    appearance: none;
    border: 1px solid var(--pill-glass-line);
    background: var(--pill-glass);
    color: var(--pill-text);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 999px;
    padding: 13px 4px;
    font-family: "Inter", sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.005em;
    cursor: pointer;
    transition: transform 0.14s ease, background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
    text-align: center;
  }
  .pill:hover { background: rgba(255, 255, 255, 0.3); }
  .pill:active { transform: scale(0.96); }
  .pill[aria-pressed="true"] {
    background: var(--select);
    color: var(--ink);
    border-color: var(--select);
    box-shadow: 0 8px 20px -10px rgba(0, 0, 0, 0.4);
    font-weight: 700;
  }

  /* ---------- responsive: stack vertically ---------- */
  @media (max-width: 820px) {
    .stage { flex-direction: column; gap: 36px; align-items: center; }
  }
</style>

<div class="slashmark">//</div>

<script>
  // Deal-state pills: tap to select, one per phone grid.
  document.querySelectorAll(".pillgrid").forEach(function (grid) {
    grid.addEventListener("click", function (e) {
      var btn = e.target.closest(".pill");
      if (!btn || !grid.contains(btn)) return;
      grid.querySelectorAll(".pill").forEach(function (p) {
        p.setAttribute("aria-pressed", "false");
      });
      btn.setAttribute("aria-pressed", "true");
    });
  });
</script>
