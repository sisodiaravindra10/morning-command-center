<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Feature · Standing Orders + Autonomy Dial</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:oklch(0.155 0.022 260); --card:oklch(0.205 0.024 260); --inset:oklch(0.13 0.02 260);
  --ink:oklch(0.96 0.008 250); --body:oklch(0.80 0.014 255); --muted:oklch(0.64 0.018 258); --soft:oklch(0.50 0.02 260);
  --hair:oklch(0.96 0.01 250 / .09); --hair2:oklch(0.96 0.01 250 / .15);
  --confident:oklch(0.80 0.11 168); --uncertain:oklch(0.82 0.12 72); --coral:oklch(0.73 0.16 28); --cobalt:oklch(0.66 0.16 262);
  --serif:'Newsreader',Georgia,serif; --sans:'Inter',-apple-system,sans-serif; --mono:'JetBrains Mono',monospace; --exp:cubic-bezier(.16,1,.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:radial-gradient(120% 80% at 50% -10%, oklch(0.22 0.04 262), oklch(0.10 0.02 260) 60%, oklch(0.08 0.015 260)); font-family:var(--sans); display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100dvh; padding:20px 16px 40px; gap:14px; -webkit-font-smoothing:antialiased}
.cap{font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:oklch(0.6 0.03 260)}
.phone{position:relative; width:393px; height:780px; max-height:calc(100dvh - 110px); background:var(--canvas); border-radius:54px; box-shadow:0 0 0 11px oklch(0.13 0.02 260), 0 0 0 12px oklch(0.28 0.02 260), 0 40px 90px -22px rgba(0,0,0,.7); overflow:hidden}
.notch{position:absolute; top:11px; left:50%; transform:translateX(-50%); width:122px; height:33px; background:#000; border-radius:20px; z-index:40}
.screen{position:absolute; inset:0; color:var(--ink); overflow-y:auto; padding:54px 22px 30px; scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}
.orb{width:16px;height:16px;border-radius:50%;background:radial-gradient(60% 60% at 32% 28%, oklch(0.92 0.08 200), oklch(0.64 0.17 250) 44%, oklch(0.34 0.11 270));box-shadow:0 0 11px oklch(0.64 0.17 250 / .5);animation:breathe 5s var(--exp) infinite;flex:none}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.hi{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft)}
.lede{font-family:var(--serif);font-size:20px;line-height:1.35;margin-top:12px;color:var(--ink)}
.lede em{font-style:italic;color:var(--confident)}

.order{background:var(--card);border:1px solid var(--hair);border-radius:18px;padding:18px;margin-top:14px}
.o-top{display:flex;align-items:baseline;gap:8px}
.o-name{font-family:var(--sans);font-size:16px;font-weight:600;letter-spacing:-.1px}
.o-rec{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--soft);letter-spacing:.02em}
.o-rec .ok{color:var(--confident)} .o-rec .corr{color:var(--uncertain)}

/* leash */
.leash{margin-top:20px;position:relative;height:8px}
.track{position:absolute;left:6px;right:6px;top:3px;height:2px;background:var(--hair2);border-radius:2px}
.fill{position:absolute;left:6px;top:3px;height:2px;background:var(--cobalt);border-radius:2px;width:0;transition:width .55s var(--exp)}
.stop{position:absolute;top:0;width:8px;height:8px;border-radius:50%;background:var(--inset);border:1.5px solid var(--hair2);transform:translateX(-50%);cursor:pointer;transition:border-color .3s}
.stop.past{border-color:var(--cobalt)}
.knob{position:absolute;top:-3px;width:16px;height:16px;border-radius:50%;background:var(--cobalt);box-shadow:0 0 12px oklch(0.66 0.16 262 / .6), 0 1px 3px rgba(0,0,0,.5);transform:translateX(-50%);transition:left .55s var(--exp);z-index:2}
.knob.lock{animation:detent .5s var(--exp)}
@keyframes detent{0%{transform:translateX(-50%) scale(1)}40%{transform:translateX(-50%) scale(1.45)}100%{transform:translateX(-50%) scale(1)}}
.labels{display:flex;justify-content:space-between;margin-top:16px}
.lb{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--soft);width:25%;text-align:center;transition:color .3s}
.lb:first-child{text-align:left} .lb:last-child{text-align:right}
.lb.cur{color:var(--ink)}
.locked-note{font-family:var(--sans);font-size:12.5px;color:var(--muted);margin-top:14px;display:flex;gap:8px;align-items:flex-start}
.locked-note svg{flex:none;margin-top:2px;color:var(--soft)}

/* promotion prompt */
.promo{margin-top:16px;padding:13px 14px;border-radius:13px;background:oklch(0.66 0.16 262 / .12);border:1px solid oklch(0.66 0.16 262 / .3);display:flex;align-items:center;gap:11px}
.promo p{font-family:var(--sans);font-size:13px;color:var(--body);flex:1;line-height:1.4}
.promo b{color:var(--confident);font-family:var(--mono);font-weight:500}
.promo button{font-family:var(--sans);font-size:13px;font-weight:600;color:oklch(0.99 0 0);background:var(--cobalt);border:none;border-radius:10px;padding:9px 14px;cursor:pointer;flex:none}
.confirm{font-family:var(--serif);font-style:italic;font-size:14.5px;line-height:1.45;color:var(--ink);margin-top:14px;padding-left:12px;border-left:1px solid var(--confident);max-height:0;overflow:hidden;opacity:0;transition:max-height .5s var(--exp),opacity .4s ease,margin-top .4s}
.confirm.show{max-height:80px;opacity:1}
@media (prefers-reduced-motion: reduce){ .orb{animation:none} .knob,.fill{transition:none} }
:focus-visible{ outline:2px solid var(--cobalt); outline-offset:2px; }
</style>
</head>
<body>
<div class="cap">Feature demo · Standing Orders + Autonomy Dial</div>
<div class="phone"><div class="notch"></div><div class="screen">
  <div class="hi"><span class="orb"></span>Leo's leash · standing orders</div>
  <div class="lede">You decide how much rope Leo gets. <em>It earns more by being right.</em></div>
  <div id="orders"></div>
</div></div>
<div class="cap">Tap a stop to set the leash. Promote where Leo has earned it.</div>
<script>
const STOPS=['Ask first','Draft for me','Send & log','Handle it'];
const ORDERS=[
  {name:'Showing confirmations', stop:3, rec:'47 handled · 0 corrected', promo:false},
  {name:'Quiet-buyer check-ins', stop:1, rec:'14 drafted · 14 you approved', promo:true, approved:14},
  {name:'Lender document chases', stop:2, rec:'9 sent · 1 you corrected', promo:false},
  {name:'Anything touching price or contract', stop:0, rec:'always asks', locked:true}
];
const wrap=document.getElementById('orders');
ORDERS.forEach((o,oi)=>{
  const el=document.createElement('div'); el.className='order'; el.dataset.i=oi;
  const recHtml = o.locked ? `<span class="o-rec">always asks</span>` :
    `<span class="o-rec">${o.rec.replace(/(\d+ you approved|\d+ clean)/,'<span class="ok">$1</span>').replace(/(\d+ you corrected)/,'<span class="corr">$1</span>')}</span>`;
  el.innerHTML=`<div class="o-top"><span class="o-name">${o.name}</span>${recHtml}</div>
    <div class="leash">
      <div class="track"></div><div class="fill"></div>
      ${[0,1,2,3].map(i=>`<div class="stop" data-stop="${i}" style="left:calc(6px + ${i/3}*(100% - 12px))"></div>`).join('')}
      <div class="knob"></div>
    </div>
    <div class="labels">${STOPS.map(s=>`<span class="lb">${s}</span>`).join('')}</div>
    ${o.locked?`<div class="locked-note"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="2.5" y="6" width="9" height="6.5" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4.5 6V4.2a2.5 2.5 0 0 1 5 0V6" stroke="currentColor" stroke-width="1.2"/></svg>Locked low on purpose. Leo will always bring money and contracts to you.</div>`:''}
    ${o.promo?`<div class="promo"><p>You approved <b>14/14</b> quiet-buyer check-ins. Let me send these myself and bring you the ones that look different?</p><button data-promote>Promote</button></div>`:''}
    <div class="confirm" data-confirm></div>`;
  wrap.appendChild(el);
  setStop(el,o.stop,false);
});
function setStop(el,idx,animate){
  const knob=el.querySelector('.knob'), fill=el.querySelector('.fill');
  const pct=idx/3;
  knob.style.left=`calc(6px + ${pct}*(100% - 12px))`;
  fill.style.width=`calc(${pct}*(100% - 12px))`;
  el.querySelectorAll('.stop').forEach((s,i)=>s.classList.toggle('past',i<=idx));
  el.querySelectorAll('.lb').forEach((l,i)=>l.classList.toggle('cur',i===idx));
  el.dataset.stop=idx;
  if(animate){ knob.classList.remove('lock'); void knob.offsetWidth; knob.classList.add('lock'); }
}
// tap a stop to set leash (respect locked high-stakes order)
wrap.querySelectorAll('.order').forEach(el=>{
  const locked=ORDERS[+el.dataset.i].locked;
  el.querySelectorAll('.stop').forEach(s=>s.addEventListener('click',()=>{ if(locked)return; setStop(el,+s.dataset.stop,true); }));
});
// promotion ceremony
document.querySelectorAll('[data-promote]').forEach(btn=>btn.addEventListener('click',()=>{
  const el=btn.closest('.order'); const next=3;
  setStop(el,next,true);
  el.querySelector('.o-rec').innerHTML='<span class="ok">15 handled · 0 corrected</span>';
  btn.closest('.promo').style.display='none';
  const c=el.querySelector('[data-confirm]'); c.textContent='I\'ll handle these myself now, and come back the first time one looks different.'; c.classList.add('show');
}));
// keyboard operability: make click-bound non-semantic controls focusable + Enter/Space activatable
(function(){
  const candidates=new Set();
  document.querySelectorAll('[onclick]').forEach(n=>candidates.add(n));
  document.querySelectorAll('.stop').forEach(n=>candidates.add(n));
  candidates.forEach(n=>{
    const tag=n.tagName.toLowerCase();
    if(tag==='button'||tag==='a') return; // do not double-bind real buttons/links
    if(n.closest('[aria-disabled="true"]')) {} // still expose, but mark below
    const order=n.closest('.order');
    const locked=order && ORDERS[+order.dataset.i] && ORDERS[+order.dataset.i].locked;
    if(n.classList.contains('stop') && locked){
      n.setAttribute('role','button');
      n.setAttribute('aria-disabled','true');
      return; // locked stops are intentionally inert; expose state, no tabindex
    }
    if(!n.hasAttribute('role')) n.setAttribute('role','button');
    if(!n.hasAttribute('tabindex')) n.setAttribute('tabindex','0');
    if(n.classList.contains('stop') && !n.hasAttribute('aria-label')){
      n.setAttribute('aria-label', STOPS[+n.dataset.stop]);
    }
  });
  document.addEventListener('keydown',e=>{
    if(e.key!=='Enter' && e.key!==' ' && e.key!=='Spacebar') return;
    const t=e.target;
    if(!t || !t.getAttribute) return;
    const tag=t.tagName ? t.tagName.toLowerCase() : '';
    if(tag==='input'||tag==='textarea'||tag==='select'||t.isContentEditable) return; // don't interfere with typing
    if(tag==='button'||tag==='a') return; // native activation already works
    if(t.getAttribute('role')==='button' && t.getAttribute('aria-disabled')!=='true'){
      e.preventDefault();
      t.click();
    }
  });
})();
</script>
</body>
</html>
